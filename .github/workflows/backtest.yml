name: Backtest

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Backtest start date (YYYY-MM-DD)"
        required: true
        default: "2025-01-01"
      end_date:
        description: "Backtest end date (YYYY-MM-DD)"
        required: true
        default: "2025-06-30"
  schedule:
    - cron: "0 3 * * 1"

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure backtest window
        env:
          START_DATE: ${{ github.event.inputs.start_date || '2025-01-01' }}
          END_DATE: ${{ github.event.inputs.end_date || '2025-06-30' }}
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          config_path = Path("config.json")
          cfg = json.loads(config_path.read_text())
          cfg.setdefault("orchestrator", {})["mode"] = "backtest"

          bt = cfg.setdefault("backtesting", {})
          bt["enabled"] = True
          bt["start_date"] = __import__("os").environ["START_DATE"]
          bt["end_date"] = __import__("os").environ["END_DATE"]
          bt["fees"] = {"commission_pct": 0.001}
          bt["slippage_model"] = {"default_bps": 10.0}

          config_path.write_text(json.dumps(cfg, indent=2))
          print(f"Configured backtest: {bt['start_date']} -> {bt['end_date']}")
          PY

      - name: Run orchestrator backtest
        run: |
          set +e
          python orchestrator.py
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Backtest run failed with exit code ${EXIT_CODE}. Showing recent logs..."
            ls -la logs || true
            tail -n 200 logs/orchestrator.log || true
            tail -n 200 logs/backtesting_agent.log || true
            tail -n 200 logs/execution_agent.log || true
            exit $EXIT_CODE
          fi

      - name: Verify backtest report exists
        run: |
          ls -la reports || true
          test -n "$(ls -1 reports/backtest_report_*.json 2>/dev/null | head -n 1)" || {
            echo "No backtest report generated in reports/."
            exit 1
          }

      - name: Upload backtest reports artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: backtest-reports-${{ github.run_id }}
          path: |
            reports/backtest_report_*.json
            reports/*.json
            logs/**
            data/backtest_context.json
          if-no-files-found: warn
