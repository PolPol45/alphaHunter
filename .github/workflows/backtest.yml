name: Walk-Forward Backtest

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Backtest start date (YYYY-MM-DD)"
        required: true
        default: "2025-04-01"
      end_date:
        description: "Backtest end date (YYYY-MM-DD)"
        required: true
        default: "2026-04-18"

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure backtest window
        env:
          START_DATE: ${{ github.event.inputs.start_date || '2025-04-01' }}
          END_DATE: ${{ github.event.inputs.end_date || '2026-04-18' }}
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path

          config_path = Path("config.json")
          cfg = json.loads(config_path.read_text())

          bt = cfg.setdefault("backtesting", {})
          bt["enabled"] = True
          bt["start_date"] = os.environ["START_DATE"]
          bt["end_date"]   = os.environ["END_DATE"]
          bt["use_real_data"] = True
          bt["fees"] = {"commission_pct": 0.001}
          bt["slippage_model"] = {"default_bps": 10.0}

          # Ensure paper trading safety
          cfg.setdefault("trading", {})["paper_trading"] = True

          config_path.write_text(json.dumps(cfg, indent=2))
          print(f"Configured: {bt['start_date']} -> {bt['end_date']}")
          PY

      - name: Pre-run disk check
        run: df -h && du -sh data/ logs/ reports/ 2>/dev/null || true

      - name: Run walk-forward backtest
        run: |
          mkdir -p logs reports data
          python run_walk_forward.py 2>&1 | tee logs/run_stdout.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Walk-forward failed (exit $EXIT_CODE)"
            tail -100 logs/backtesting_agent.log  || true
            tail -100 logs/risk_agent.log          || true
            tail -100 logs/execution_agent.log     || true
            exit $EXIT_CODE
          fi

      - name: Show final equity
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for fname in ["portfolio_institutional.json", "portfolio_retail.json"]:
              p = Path("data") / fname
              if p.exists():
                  d = json.loads(p.read_text())
                  print(f"{fname}: equity={d.get('total_equity',0):.2f} | pnl_pct={d.get('total_pnl_pct',0)*100:.2f}% | dd={d.get('drawdown_pct',0)*100:.2f}%")

          reps = sorted(Path("reports").glob("backtest_report_*.json"))
          if reps:
              r = json.loads(reps[-1].read_text())
              m = r.get("metrics", {})
              print(f"\nBacktest report: {reps[-1].name}")
              print(f"  sharpe={m.get('sharpe',0):.3f} | sortino={m.get('sortino',0):.3f} | max_dd={m.get('max_drawdown',0)*100:.2f}%")
              print(f"  win_rate={m.get('win_rate',0)*100:.1f}% | trades={r.get('summary',{}).get('trades',0)}")
              eq = r.get("equity_curve", [])
              if len(eq) >= 2:
                  ret = (eq[-1] - eq[0]) / eq[0] * 100
                  print(f"  total_return={ret:.2f}%  ({eq[0]:.0f} -> {eq[-1]:.0f})")
          PY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ github.run_id }}
          retention-days: 30
          path: |
            reports/backtest_report_*.json
            logs/run_stdout.log
            logs/execution_agent.log
            logs/risk_agent.log
            logs/backtesting_agent.log
            data/portfolio_institutional.json
            data/portfolio_retail.json

      - name: Publish reports to backtest-reports branch
        if: success()
        env:
          TARGET_BRANCH: backtest-reports
        run: |
          set -euo pipefail
          REPORT=$(ls reports/backtest_report_*.json 2>/dev/null | head -1)
          if [ -z "$REPORT" ]; then echo "No report to publish."; exit 0; fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "${TARGET_BRANCH}" 2>/dev/null || true

          if git show-ref --verify --quiet "refs/remotes/origin/${TARGET_BRANCH}"; then
            git checkout -B "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"
          else
            git checkout --orphan "${TARGET_BRANCH}"
            git rm -rf . >/dev/null 2>&1 || true
            mkdir -p reports && touch reports/.gitkeep
            git add reports/.gitkeep
            git commit -m "chore: init ${TARGET_BRANCH}"
          fi

          mkdir -p reports
          cp reports/backtest_report_*.json reports/ 2>/dev/null || true

          git add reports/
          if git diff --cached --quiet; then echo "No changes."; exit 0; fi
          git commit -m "backtest: run ${GITHUB_RUN_ID} ($(date -u +%Y-%m-%d))"
          git push origin "${TARGET_BRANCH}"
